name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version to publish (example: 1.1.0). If omitted, minor is bumped automatically."
        required: false
        type: string
      release_name:
        description: "GitHub release title"
        required: false
        type: string
      release_notes:
        description: "Optional release notes"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Determine target version and tag
        id: versioning
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(./gradlew properties -q | awk -F': ' '/^version:/ {print $2; exit}')"
          INPUT_VERSION="${{ inputs.version }}"

          echo "Current version: $CURRENT_VERSION"

          if [[ -n "$INPUT_VERSION" ]]; then
            TARGET_VERSION="$INPUT_VERSION"
          else
            if [[ ! "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Current version '$CURRENT_VERSION' is not valid semver (x.y.z)"
              exit 1
            fi

            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            TARGET_VERSION="${MAJOR}.$((MINOR + 1)).0"
          fi

          if [[ ! "$TARGET_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Target version '$TARGET_VERSION' is not valid semver (x.y.z)"
            exit 1
          fi

          TARGET_TAG="v${TARGET_VERSION}"

          echo "Target version: $TARGET_VERSION"
          echo "Target tag:     $TARGET_TAG"

          if git ls-remote --tags origin "refs/tags/${TARGET_TAG}" | grep -q "${TARGET_TAG}"; then
            echo "Tag already exists on origin: $TARGET_TAG"
            exit 1
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "target_version=$TARGET_VERSION" >> "$GITHUB_OUTPUT"
          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"

      - name: Update project version
        shell: bash
        run: |
          set -euo pipefail

          TARGET_VERSION="${{ steps.versioning.outputs.target_version }}"

          if ! grep -qE '^version=' gradle.properties; then
            echo "gradle.properties does not contain a version= entry"
            exit 1
          fi

          sed -i -E "s/^version=.*/version=${TARGET_VERSION}/" gradle.properties

          echo "Updated gradle.properties:"
          grep -E '^version=' gradle.properties

      - name: Verify Gradle version
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_VERSION="$(./gradlew properties -q | awk -F': ' '/^version:/ {print $2; exit}')"
          TARGET_VERSION="${{ steps.versioning.outputs.target_version }}"

          echo "Project version: $PROJECT_VERSION"
          echo "Target version:  $TARGET_VERSION"

          if [[ "$PROJECT_VERSION" != "$TARGET_VERSION" ]]; then
            echo "Gradle version does not match target version."
            exit 1
          fi

      - name: Commit version change
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add gradle.properties

          if git diff --cached --quiet; then
            echo "No version change to commit."
          else
            git commit -m "Release v${{ steps.versioning.outputs.target_version }}"
            git push origin HEAD
          fi

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Create and push git tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.versioning.outputs.target_tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists locally: $TAG"
            exit 1
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.versioning.outputs.target_tag }}"
          RELEASE_NAME="${{ inputs.release_name }}"

          if [[ -z "$RELEASE_NAME" ]]; then
            RELEASE_NAME="$TAG"
          fi

          if [[ -n "${{ inputs.release_notes }}" ]]; then
            gh release create "$TAG" \
              --title "$RELEASE_NAME" \
              --notes "${{ inputs.release_notes }}"
          else
            gh release create "$TAG" \
              --title "$RELEASE_NAME" \
              --generate-notes
          fi
